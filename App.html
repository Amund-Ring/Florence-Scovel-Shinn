/* ─── WEIGHTED RANDOM SELECTION ─── */
function pickQuote(quotes, excludeIds) {
  const pool = quotes.filter(q => !excludeIds.includes(q.id));
  if (!pool.length) return quotes.find(q => !excludeIds.includes(q.id)) || quotes[0];
  const today = new Date().toDateString();
  const weights = pool.map(q => {
    let w = 1 / (q.times_shown + 1);
    if (q.last_shown === today) w *= 0.1;
    return w;
  });
  const total = weights.reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) {
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[pool.length - 1];
}

/* ─── FOCUS MODE ─── */
function FocusMode({ quotes, startIdx, onClose, onFavorite, allQuotes }) {
  const t = useTheme();
  const [idx, setIdx] = React.useState(startIdx);
  const [dragStart, setDragStart] = React.useState(null);
  const [offset, setOffset] = React.useState(0);
  const [animDir, setAnimDir] = React.useState(0);

  const q = quotes[idx];
  const col = getColor(q.category);

  const goTo = (newIdx) => {
    if (newIdx < 0 || newIdx >= quotes.length) return;
    setAnimDir(newIdx > idx ? -1 : 1);
    setTimeout(() => { setIdx(newIdx); setAnimDir(0); setOffset(0); }, 180);
  };

  const handlePointerDown = (e) => { setDragStart(e.clientX); };
  const handlePointerMove = (e) => { if (dragStart === null) return; setOffset(e.clientX - dragStart); };
  const handlePointerUp = () => {
    if (Math.abs(offset) > 60) {
      if (offset < 0 && idx < quotes.length - 1) goTo(idx + 1);
      else if (offset > 0 && idx > 0) goTo(idx - 1);
    }
    setDragStart(null); setOffset(0);
  };

  const fullQ = allQuotes.find(aq => aq.id === q.id);
  const isFav = fullQ?.is_favorite;

  const panelBg = t.dark ? t.bgCard : col.bg;

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 50, background: panelBg, display: 'flex', flexDirection: 'column', overflow: 'hidden', transition: 'background 0.3s' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px 20px 0' }}>
        <button onClick={onClose} style={{
          width: 36, height: 36, borderRadius: 10,
          border: `1px solid ${t.border}`,
          background: t.dark ? t.bg : 'rgba(255,255,255,0.7)', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: t.textSecondary,
        }}><IconX /></button>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {quotes.map((_, i) => (
            <div key={i} onClick={() => goTo(i)} style={{
              width: i === idx ? 20 : 7, height: 7, borderRadius: 4, cursor: 'pointer',
              background: i === idx ? col.accent : t.border,
              transition: 'width 0.25s, background 0.25s',
            }} />
          ))}
        </div>
        <button onClick={() => onFavorite(q.id)} style={{
          width: 36, height: 36, borderRadius: 10,
          border: `1px solid ${isFav ? col.accent : t.border}`,
          background: isFav ? col.bg : (t.dark ? t.bg : 'rgba(255,255,255,0.7)'),
          color: isFav ? col.accent : t.textSecondary,
          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}><IconHeart filled={isFav} /></button>
      </div>
      <div
        style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '32px 28px', userSelect: 'none', cursor: 'grab', touchAction: 'pan-y' }}
        onPointerDown={handlePointerDown} onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}
      >
        <div style={{ transform: `translateX(${offset * 0.4}px)`, opacity: animDir !== 0 ? 0 : 1, transition: animDir !== 0 ? 'opacity 0.18s, transform 0.18s' : 'transform 0.1s' }}>
          <div style={{ marginBottom: 20 }}><CatPill category={q.category} /></div>
          <p style={{ fontFamily: "'DM Serif Display', serif", fontSize: 22, lineHeight: 1.7, color: t.textPrimary, fontWeight: 400, textWrap: 'pretty' }}>{q.quote}</p>
          <div style={{ marginTop: 28, display: 'flex', flexDirection: 'column', gap: 3 }}>
            <p style={{ fontSize: 12, color: t.textSecondary, fontStyle: 'italic' }}>{q.book_title}</p>
            <p style={{ fontSize: 11, color: t.textMuted, fontWeight: 500 }}>{q.chapter_title}</p>
          </div>
        </div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', padding: '0 16px 28px', alignItems: 'center' }}>
        <button onClick={() => goTo(idx - 1)} disabled={idx === 0} style={{
          width: 40, height: 40, borderRadius: 12,
          border: `1px solid ${t.border}`,
          background: t.dark ? t.bg : 'rgba(255,255,255,0.7)',
          color: idx === 0 ? t.border : t.textPrimary,
          cursor: idx === 0 ? 'default' : 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}><IconChevronLeft /></button>
        <span style={{ fontSize: 12, color: t.textSecondary, fontWeight: 500 }}>{idx + 1} / {quotes.length}</span>
        <button onClick={() => goTo(idx + 1)} disabled={idx === quotes.length - 1} style={{
          width: 40, height: 40, borderRadius: 12,
          border: `1px solid ${t.border}`,
          background: t.dark ? t.bg : 'rgba(255,255,255,0.7)',
          color: idx === quotes.length - 1 ? t.border : t.textPrimary,
          cursor: idx === quotes.length - 1 ? 'default' : 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}><IconChevronRight /></button>
      </div>
    </div>
  );
}

/* ─── SLOT PICKER MODAL ─── */
function SlotPicker({ quote, todayQuotes, allQuotes, onAssign, onClose }) {
  const t = useTheme();
  const col = getColor(quote.category);
  const slotLabels = ['Slot 1', 'Slot 2', 'Slot 3'];
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 60, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(10,8,6,0.45)', backdropFilter: 'blur(2px)' }} />
      <div style={{
        position: 'relative', zIndex: 1,
        background: t.bg,
        borderRadius: '20px 20px 0 0',
        padding: '20px 20px 36px',
        display: 'flex', flexDirection: 'column', gap: 16,
        boxShadow: '0 -8px 40px rgba(0,0,0,0.15)',
      }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: t.border, alignSelf: 'center', marginBottom: 4 }} />
        <div>
          <h3 style={{ fontFamily: "'DM Serif Display', serif", fontSize: 20, fontWeight: 400, color: t.textPrimary, marginBottom: 6 }}>Add to Today</h3>
          <div style={{ background: col.bg, borderRadius: 10, padding: '10px 12px', borderLeft: `3px solid ${col.accent}` }}>
            <CatPill category={quote.category} small />
            <p style={{ fontFamily: "'DM Serif Display', serif", fontSize: 14, lineHeight: 1.5, color: t.textPrimary, marginTop: 6 }}>
              {quote.quote.length > 80 ? quote.quote.slice(0, 80) + '…' : quote.quote}
            </p>
          </div>
        </div>
        <div>
          <p style={{ fontSize: 11, fontWeight: 600, color: t.textSecondary, letterSpacing: '0.5px', marginBottom: 10, textTransform: 'uppercase' }}>Choose a slot to replace</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {todayQuotes.map((slot, i) => {
              const slotQ = allQuotes.find(q => q.id === slot.id);
              return (
                <button key={i} onClick={() => !slot.locked && onAssign(i)} disabled={slot.locked} style={{
                  width: '100%', textAlign: 'left', padding: '11px 14px', borderRadius: 12,
                  border: `1px solid ${slot.locked ? t.borderSub : t.btnBorder}`,
                  background: slot.locked ? t.borderSub : t.bgCard,
                  cursor: slot.locked ? 'not-allowed' : 'pointer',
                  display: 'flex', alignItems: 'center', gap: 12,
                  transition: 'background 0.1s', opacity: slot.locked ? 0.6 : 1,
                }}>
                  <span style={{ fontSize: 11, fontWeight: 600, color: t.textSecondary, minWidth: 48, fontFamily: "'DM Sans', sans-serif" }}>{slotLabels[i]}</span>
                  <span style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 3, minWidth: 0, overflow: 'hidden' }}>
                    {slotQ && <span style={{ fontSize: 12, color: t.textPrimary, fontFamily: "'DM Serif Display', serif", lineHeight: 1.3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', display: 'block' }}>{slotQ.quote}</span>}
                    {slotQ && <span style={{ fontSize: 10 }}><CatPill category={slotQ.category} small /></span>}
                  </span>
                  {slot.locked && <span style={{ fontSize: 12 }}>🔒</span>}
                  {!slot.locked && <IconChevronRight />}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── TODAY SCREEN ─── */
function TodayScreen({ todayQuotes, allQuotes, onLock, onRefreshSlot, onRefreshAll, onFocus, onFavorite, darkMode, onToggleDark }) {
  const t = useTheme();
  const S = makeS(t);
  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
  const todayFull = todayQuotes.map(tq => ({ ...allQuotes.find(q => q.id === tq.id), locked: tq.locked })).filter(Boolean);

  const IconMoon = () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  );
  const IconSunSm = () => (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  );

  return (
    <div style={S.screen}>
      <div style={S.header}>
        <span style={S.title}>Today</span>
        <button onClick={onToggleDark} title={darkMode ? 'Switch to light' : 'Switch to dark'} style={{
          width: 34, height: 34, borderRadius: 10,
          border: `1px solid ${t.btnBorder}`,
          background: t.bgCard, color: t.textSecondary,
          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'all 0.15s',
        }}>
          {darkMode ? <IconSunSm /> : <IconMoon />}
        </button>
      </div>
      <div style={S.body}>
        {todayFull.map((q, i) => (
          <TodayCard
            key={q.id + i} quote={q} slot={i} locked={q.locked}
            onLock={() => onLock(i)}
            onRefresh={() => onRefreshSlot(i)}
            onTap={() => onFocus(i)}
          />
        ))}
        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 4, paddingBottom: 8 }}>
          <button onClick={onRefreshAll} style={{
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 14, fontWeight: 500,
            padding: '10px 28px', borderRadius: 24,
            border: `1.5px solid ${t.btnBorder}`,
            background: t.bgCard, color: t.textPrimary,
            cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8,
            transition: 'background 0.15s, box-shadow 0.15s',
            boxShadow: t.shadow,
          }}
            onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 2px 8px rgba(0,0,0,0.12)'; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow = t.shadow; }}
          >
            <IconRefresh /> New Set
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── SLIDERS / CONTROLS ICON ─── */
const IconControls = ({ active }) => (
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={active ? "2.5" : "2"} strokeLinecap="round" strokeLinejoin="round">
    <line x1="4" y1="6" x2="20" y2="6"/>
    <circle cx="8" cy="6" r="2" fill={active ? 'currentColor' : 'none'} strokeWidth="2"/>
    <line x1="4" y1="12" x2="20" y2="12"/>
    <circle cx="16" cy="12" r="2" fill={active ? 'currentColor' : 'none'} strokeWidth="2"/>
    <line x1="4" y1="18" x2="20" y2="18"/>
    <circle cx="10" cy="18" r="2" fill={active ? 'currentColor' : 'none'} strokeWidth="2"/>
  </svg>
);

function ControlsBtn({ onClick, active }) {
  const t = useTheme();
  return (
    <button onClick={onClick} title="Filter &amp; Sort" style={{
      width: 34, height: 34, borderRadius: 10,
      border: `1px solid ${active ? t.textPrimary : t.btnBorder}`,
      background: active ? t.btnActiveBg : t.bgCard,
      color: active ? (t.dark ? t.bg : '#fff') : t.textSecondary,
      cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
      transition: 'all 0.15s', flexShrink: 0,
    }}>
      <IconControls active={active} />
    </button>
  );
}

function ScrollChipRow({ label, options, active, onSelect }) {
  const t = useTheme();
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
      <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.6px', textTransform: 'uppercase', color: t.textSecondary, padding: '10px 16px 5px', fontFamily: "'DM Sans', sans-serif" }}>{label}</span>
      <div style={{ display: 'flex', gap: 6, overflowX: 'auto', padding: '0 16px 10px', scrollbarWidth: 'none', WebkitOverflowScrolling: 'touch' }}>
        {options.map(opt => (
          <button key={opt.id} onClick={() => onSelect(opt.id)} style={{
            fontFamily: "'DM Sans', sans-serif",
            fontSize: 12, fontWeight: active === opt.id ? 600 : 400,
            padding: '4px 12px', borderRadius: 20, flexShrink: 0,
            border: active === opt.id ? 'none' : `1px solid ${t.btnBorder}`,
            background: active === opt.id ? t.btnActiveBg : t.bgCard,
            color: active === opt.id ? (t.dark ? t.bg : '#fff') : t.textSecondary,
            cursor: 'pointer', transition: 'all 0.15s', whiteSpace: 'nowrap',
          }}>{opt.label}</button>
        ))}
      </div>
    </div>
  );
}

function ControlsPanel({ activeCat, onCat, activeSort, onSort }) {
  const t = useTheme();
  return (
    <div style={{ borderBottom: `1px solid ${t.border}`, display: 'flex', flexDirection: 'column' }}>
      <ScrollChipRow label="Category" options={CAT_OPTS} active={activeCat} onSelect={onCat} />
      <div style={{ height: 1, background: t.border }} />
      <ScrollChipRow label="Sort by" options={SORT_OPTS_FULL} active={activeSort} onSelect={onSort} />
    </div>
  );
}

/* ─── LIBRARY SCREEN ─── */
function LibraryScreen({ allQuotes, todayQuotes, onFavorite, onFocus, onSetToday }) {
  const t = useTheme();
  const S = makeS(t);
  const [activeCat, setActiveCat] = React.useState('All');
  const [activeSort, setActiveSort] = React.useState('date');
  const [showControls, setShowControls] = React.useState(false);
  let filtered = activeCat === 'All' ? allQuotes : allQuotes.filter(q => q.category === activeCat);
  filtered = sortFavs(filtered, activeSort, allQuotes);
  const hasActive = activeCat !== 'All' || activeSort !== 'date';
  return (
    <div style={S.screen}>
      <div style={S.header}>
        <span style={S.title}>Library</span>
        <ControlsBtn onClick={() => setShowControls(v => !v)} active={showControls || hasActive} />
      </div>
      {showControls && <ControlsPanel activeCat={activeCat} onCat={setActiveCat} activeSort={activeSort} onSort={setActiveSort} />}
      <div style={{ ...S.body, gap: 0, padding: '0 16px' }}>
        {filtered.map((quote, i) => (
          <LibraryItem key={quote.id} quote={quote} todayQuotes={todayQuotes}
            onFavorite={() => onFavorite(quote.id)}
            onTap={() => onFocus(allQuotes.findIndex(q => q.id === quote.id))}
            onSetToday={() => onSetToday(quote)}
            isLast={i === filtered.length - 1} />
        ))}
      </div>
    </div>
  );
}

function LibraryItem({ quote, todayQuotes, onFavorite, onTap, onSetToday, isLast }) {
  const t = useTheme();
  const col = getColor(quote.category);
  const isInToday = todayQuotes.some(tq => tq.id === quote.id);
  return (
    <div style={{
      display: 'flex', alignItems: 'flex-start', gap: 12,
      padding: '14px 0',
      borderBottom: isLast ? 'none' : `1px solid ${t.borderSub}`,
      cursor: 'pointer',
    }} onClick={onTap}>
      <div style={{ width: 3, background: col.accent, borderRadius: 2, alignSelf: 'stretch', minHeight: 32, flexShrink: 0, marginTop: 3 }} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <p style={{ fontFamily: "'DM Serif Display', serif", fontSize: 14.5, lineHeight: 1.55, color: t.textPrimary, fontWeight: 400, textWrap: 'pretty', marginBottom: 5 }}>{quote.quote}</p>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <CatPill category={quote.category} small />
          <span style={{ fontSize: 10, color: t.textMuted }}>· {quote.book_title === 'The Game of Life and How to Play It' ? 'The Game of Life' : quote.book_title}</span>
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, flexShrink: 0, paddingTop: 2 }} onClick={e => e.stopPropagation()}>
        <button onClick={onFavorite} style={{
          width: 30, height: 30, borderRadius: 8,
          border: `1px solid ${quote.is_favorite ? 'oklch(70% 0.12 20)' : t.btnBorder}`,
          background: quote.is_favorite ? 'oklch(96% 0.04 20)' : t.bgCard,
          color: quote.is_favorite ? 'oklch(55% 0.14 20)' : t.textSecondary,
          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'all 0.15s',
        }}><IconHeart filled={quote.is_favorite} /></button>
        <button onClick={onSetToday} title="Add to Today" style={{
          width: 30, height: 30, borderRadius: 8,
          border: `1px solid ${isInToday ? col.accent : t.btnBorder}`,
          background: isInToday ? col.bg : t.bgCard,
          color: isInToday ? col.text : t.textSecondary,
          cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 13, fontWeight: 600, fontFamily: "'DM Sans', sans-serif",
          transition: 'all 0.15s',
        }}>+</button>
      </div>
    </div>
  );
}

function sortFavs(favs, sort, allQuotes) {
  if (sort === 'alpha') return [...favs].sort((a, b) => a.quote.localeCompare(b.quote));
  if (sort === 'date')  return [...favs].sort((a, b) => allQuotes.findIndex(q => q.id === a.id) - allQuotes.findIndex(q => q.id === b.id));
  return [...favs].sort((a, b) => a.category !== b.category ? a.category.localeCompare(b.category) : a.quote.localeCompare(b.quote));
}

/* ─── FAVORITES SCREEN ─── */
function FavoritesScreen({ allQuotes, todayQuotes, onFavorite, onFocus, onSetToday }) {
  const t = useTheme();
  const S = makeS(t);
  const [sort, setSort]             = React.useState('date');
  const [activeCat, setActiveCat]   = React.useState('All');
  const [showControls, setShowControls] = React.useState(false);
  const favs = allQuotes.filter(q => q.is_favorite);
  const hasActive = activeCat !== 'All' || sort !== 'date';
  const displayFavs = activeCat === 'All' ? favs : favs.filter(q => q.category === activeCat);
  const sorted = sortFavs(displayFavs, sort, allQuotes);
  const grouped = sort === 'cat'
    ? Object.entries(sorted.reduce((acc, q) => { (acc[q.category] = acc[q.category] || []).push(q); return acc; }, {}))
    : null;
  if (favs.length === 0) {
    return (
      <div style={S.screen}>
        <div style={S.header}><span style={S.title}>Saved</span></div>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 40, gap: 16 }}>
          <div style={{ width: 64, height: 64, borderRadius: 20, background: 'oklch(94% 0.02 20)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'oklch(70% 0.10 20)' }}><IconHeart /></div>
          <p style={{ fontFamily: "'DM Serif Display', serif", fontSize: 20, color: t.textPrimary, textAlign: 'center' }}>No saved quotes yet</p>
          <p style={{ fontSize: 13, color: t.textSecondary, textAlign: 'center', lineHeight: 1.6 }}>Tap the ♡ on any quote in the Library to save it here.</p>
        </div>
      </div>
    );
  }
  return (
    <div style={S.screen}>
      <div style={S.header}>
        <span style={S.title}>Saved</span>
        <ControlsBtn onClick={() => setShowControls(v => !v)} active={showControls || hasActive} />
      </div>
      {showControls && <ControlsPanel activeCat={activeCat} onCat={setActiveCat} activeSort={sort} onSort={setSort} />}
      <div style={{ ...S.body, gap: 0, padding: '0 16px' }}>
        {grouped ? (
          grouped.map(([cat, items]) => (
            <div key={cat}>
              <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.7px', textTransform: 'uppercase', color: getColor(cat).text, padding: '14px 0 8px', borderBottom: `2px solid ${getColor(cat).accent}`, marginBottom: 2 }}>{cat}</div>
              {items.map((quote, i) => <LibraryItem key={quote.id} quote={quote} todayQuotes={todayQuotes} onFavorite={() => onFavorite(quote.id)} onTap={() => onFocus(allQuotes.findIndex(q => q.id === quote.id))} onSetToday={() => onSetToday(quote)} isLast={i === items.length - 1} />)}
            </div>
          ))
        ) : (
          sorted.map((quote, i) => <LibraryItem key={quote.id} quote={quote} todayQuotes={todayQuotes} onFavorite={() => onFavorite(quote.id)} onTap={() => onFocus(allQuotes.findIndex(q => q.id === quote.id))} onSetToday={() => onSetToday(quote)} isLast={i === sorted.length - 1} />)
        )}
      </div>
    </div>
  );
}

/* ─── ROOT APP ─── */
function App() {
  const [quotes, setQuotes] = React.useState(INITIAL_QUOTES);
  const [todaySlots, setTodaySlots] = React.useState(INITIAL_TODAY);
  const [tab, setTab] = React.useState('today');
  const [focusMode, setFocusMode] = React.useState(null);
  const [slotPicker, setSlotPicker] = React.useState(null);
  const [darkMode, setDarkMode] = React.useState(false);
  const [isMobile, setIsMobile] = React.useState(window.innerWidth <= 600);

  React.useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth <= 600);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  const activeTheme = darkMode ? THEMES.night : THEMES.ivory;

  React.useEffect(() => {
    if (isMobile) document.body.style.background = activeTheme.bg;
    else document.body.style.background = '#1c1917';
  }, [isMobile, activeTheme]);

  // Pick a quote not in excludeIds
  const pickNew = (excludeIds) => pickQuote(quotes, excludeIds);

  const handleLock = (slotIdx) => {
    setTodaySlots(slots => slots.map((s, i) => i === slotIdx ? { ...s, locked: !s.locked } : s));
  };

  const handleRefreshSlot = (slotIdx) => {
    const exclude = todaySlots.map(s => s.id);
    const newQ = pickNew(exclude.filter((_, i) => i !== slotIdx));
    setTodaySlots(slots => slots.map((s, i) => i === slotIdx ? { ...s, id: newQ.id } : s));
    setQuotes(qs => qs.map(q => q.id === newQ.id ? { ...q, times_shown: q.times_shown + 1, last_shown: new Date().toDateString() } : q));
  };

  const handleRefreshAll = () => {
    const newSlots = [...todaySlots];
    const usedIds = todaySlots.filter(s => s.locked).map(s => s.id);
    for (let i = 0; i < newSlots.length; i++) {
      if (!newSlots[i].locked) {
        const exclude = [...usedIds, ...newSlots.filter((_, j) => j !== i && !newSlots[j].locked).map(s => s.id)];
        // collect already-assigned ids in this pass
        const alreadyPicked = newSlots.slice(0, i).filter((_, j) => !todaySlots[j].locked).map(s => s.id);
        const newQ = pickNew([...usedIds, ...alreadyPicked]);
        newSlots[i] = { ...newSlots[i], id: newQ.id };
        setQuotes(qs => qs.map(q => q.id === newQ.id ? { ...q, times_shown: q.times_shown + 1, last_shown: new Date().toDateString() } : q));
      }
    }
    setTodaySlots(newSlots);
  };

  const handleFavorite = (qId) => {
    setQuotes(qs => qs.map(q => q.id === qId ? { ...q, is_favorite: !q.is_favorite } : q));
  };

  // Focus from Today: show only the 3 today quotes
  const openTodayFocus = (startIdx) => {
    const todayFull = todaySlots.map(tq => quotes.find(q => q.id === tq.id)).filter(Boolean);
    setFocusMode({ quotes: todayFull, startIdx });
  };

  // Focus from Library/Favorites: show all quotes
  const openLibFocus = (startIdx) => {
    setFocusMode({ quotes, startIdx });
  };

  const handleAssignSlot = (slotIdx) => {
    if (!slotPicker) return;
    setTodaySlots(slots => slots.map((s, i) => i === slotIdx ? { ...s, id: slotPicker.id } : s));
    setQuotes(qs => qs.map(q => q.id === slotPicker.id ? { ...q, times_shown: q.times_shown + 1, last_shown: new Date().toDateString() } : q));
    setSlotPicker(null);
  };

  const screens = (
    <div style={{ position: 'relative', height: '100%', display: 'flex', flexDirection: 'column', paddingTop: isMobile ? 0 : 50 }}>
      <div style={{ flex: 1, overflow: 'hidden', position: 'relative' }}>
        {tab === 'today' && (
          <TodayScreen
            todayQuotes={todaySlots} allQuotes={quotes}
            onLock={handleLock} onRefreshSlot={handleRefreshSlot}
            onRefreshAll={handleRefreshAll} onFocus={openTodayFocus}
            onFavorite={handleFavorite}
            darkMode={darkMode} onToggleDark={() => setDarkMode(v => !v)}
          />
        )}
        {tab === 'library' && (
          <LibraryScreen allQuotes={quotes} todayQuotes={todaySlots}
            onFavorite={handleFavorite} onFocus={openLibFocus}
            onSetToday={(q) => setSlotPicker(q)} />
        )}
        {tab === 'favorites' && (
          <FavoritesScreen allQuotes={quotes} todayQuotes={todaySlots}
            onFavorite={handleFavorite} onFocus={openLibFocus}
            onSetToday={(q) => setSlotPicker(q)} />
        )}
        {focusMode && (
          <FocusMode quotes={focusMode.quotes} startIdx={focusMode.startIdx}
            onClose={() => setFocusMode(null)} onFavorite={handleFavorite} allQuotes={quotes} />
        )}
        {slotPicker && (
          <SlotPicker quote={slotPicker} todayQuotes={todaySlots} allQuotes={quotes}
            onAssign={handleAssignSlot} onClose={() => setSlotPicker(null)} />
        )}
      </div>
      {!focusMode && <TabBar active={tab} onTab={setTab} />}
    </div>
  );

  if (isMobile) {
    return (
      <ThemeCtx.Provider value={activeTheme}>
        <div style={{
          position: 'fixed', inset: 0,
          paddingTop: 'env(safe-area-inset-top)',
          paddingBottom: 'env(safe-area-inset-bottom)',
          background: activeTheme.bg,
          display: 'flex', flexDirection: 'column',
          transition: 'background 0.3s',
        }}>
          {screens}
        </div>
      </ThemeCtx.Provider>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20 }}>
      <ThemeCtx.Provider value={activeTheme}>
        <IOSDevice width={390} height={844} dark={darkMode}>
          {screens}
        </IOSDevice>
      </ThemeCtx.Provider>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
